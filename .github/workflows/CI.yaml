name: CI

on:
  # GitHub has started calling new repo's first branch "main" https://github.com/github/renaming
  # The cookiecutter uses the "--initial-branch" flag when it runs git-init
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  schedule:
    # Weekly tests run on main by default:
    #   Scheduled workflows run on the latest commit on the default or base branch.
    #   (from https://help.github.com/en/actions/reference/events-that-trigger-workflows#scheduled-events-schedule)
    - cron: "0 0 * * 0"

jobs:
  test:
    name: Test on ${{ matrix.os }}, Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macOS-latest, ubuntu-latest, windows-latest]
        python-version: [3.10, 3.11, 3.12]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # More info on options: https://github.com/marketplace/actions/provision-with-micromamba
      - name: Set up Micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: devtools/conda-envs/test_env.yaml
          environment-name: informalff-ci
          cache-environment: true
          generate-run-shell: true
      
      - name: Show environment info
        shell: micromamba-shell {0}
        run: |
          python --version
          micromamba info
          which python || where python

      # - name: Set up Python ${{ matrix.python-version }}
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python-version }}
      
      - name: Set up Fortran
        id: setup-fortran
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc
          version: 13

      - name: Additional info about the build
        shell: bash
        run: |
          uname -a
          df -h
          ulimit -a

      - name: Install package
        # conda setup requires this special shell
        shell: micromamba-shell {0}
        run: |
          python -m pip install -e .
          micromamba list
      
      - name: Build Fortran shared libraries
        shell: bash
        run: |
          EXT=so
          if [ "${{ runner.os }}" = "macOS" ]; then EXT=dylib; fi
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=dll; fi

          for src in $(find . -type f \( -name "*.f90" -o -name "*.f" \)); do
            mod="${src%.*}"
            $FC -shared -fPIC "$src" -o "${mod}.${EXT}"
          done

      - name: Run tests
        # conda setup requires this special shell
        shell: micromamba-shell {0}
        run: |
          pytest -v --cov=informalff --cov-report=xml --color=yes informalff/tests/

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
